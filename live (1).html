<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="60">
<title>Torneo Pallavolo — Classifiche Live</title>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getDatabase,ref,onValue,off}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const cfg={apiKey:"AIzaSyAI0RJEgV4n5kzJUxWbtn7S6mDeqQFcJu8",authDomain:"manager-torneo-pallavolo.firebaseapp.com",projectId:"manager-torneo-pallavolo",storageBucket:"manager-torneo-pallavolo.firebasestorage.app",messagingSenderId:"60737736156",appId:"1:60737736156:web:98d9e7f181c54676461319",databaseURL:"https://manager-torneo-pallavolo-default-rtdb.europe-west1.firebasedatabase.app"};
const app=initializeApp(cfg);
const db=getDatabase(app);
onValue(ref(db,'db'),(snap)=>{
  const data=snap.val();
  if(data&&data.tornei){window._liveDB=data;renderLive();}
  setSyncStatus('ok');
});
</script>
<style>
:root{--footer-text:rgba(255,255,255,0.5);--bg:#0f1117;--card:#1a1d27;--border:rgba(255,255,255,0.10);--txt:#f0f0f0;--txt2:#888;--accent-w:#4a9eff;--accent-g:#4ade80;--accent-r:#f87171;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.live-header{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.live-title{font-size:22px;font-weight:700;color:#fff}
.live-subtitle{font-size:13px;color:var(--txt2);margin-top:2px}
.header-right{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
.sync-txt{font-size:12px;color:#4ade80;font-weight:500}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.9)}}
.torneo-tabs{display:flex;gap:6px;padding:16px 24px 0;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.torneo-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2);border:1px solid transparent;border-bottom:none;transition:all .15s}
.torneo-tab.active{background:var(--card);color:#fff;border-color:var(--border)}
.live-body{padding:20px 16px;max-width:1600px;margin:0 auto}
.cat-section{margin-bottom:32px}
.cat-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid}
.cat-header.white{border-color:var(--accent-w)}
.cat-header.green{border-color:var(--accent-g)}
.cat-header.red{border-color:var(--accent-r)}
.cat-title{font-size:20px;font-weight:700}
.cat-title.white{color:var(--accent-w)}
.cat-title.green{color:var(--accent-g)}
.cat-title.red{color:var(--accent-r)}
.cat-count{font-size:12px;color:var(--txt2);background:rgba(255,255,255,0.08);padding:3px 10px;border-radius:20px}
.gironi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
@media(max-width:500px){.gironi-grid{grid-template-columns:1fr}}
.girone-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.girone-card-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.girone-card-header.white{background:rgba(74,158,255,0.12);border-bottom:1px solid rgba(74,158,255,0.2)}
.girone-card-header.green{background:rgba(74,222,128,0.12);border-bottom:1px solid rgba(74,222,128,0.2)}
.girone-card-header.red{background:rgba(248,113,113,0.12);border-bottom:1px solid rgba(248,113,113,0.2)}
.girone-label{font-size:13px;font-weight:700}
.girone-label.white{color:var(--accent-w)}
.girone-label.green{color:var(--accent-g)}
.girone-label.red{color:var(--accent-r)}
.girone-progress{font-size:11px;color:var(--txt2)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
th.r{text-align:right}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px}
td.r{text-align:right}
tr:last-child td{border-bottom:none}
.rank{font-weight:700;width:24px}
.r1{color:#fbbf24}.r2{color:#94a3b8}.r3{color:#cd7c3a}
.team-name{font-weight:600;color:var(--txt)}
.team-soc{font-size:10px;color:var(--txt2);margin-top:1px}
.pts{font-size:16px;font-weight:800}
.pts.white{color:var(--accent-w)}.pts.green{color:var(--accent-g)}.pts.red{color:var(--accent-r)}
.ds-pos{color:#4ade80;font-weight:600}.ds-neg{color:#f87171;font-weight:600}
.fase-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.fb-w{background:rgba(74,158,255,0.2);color:var(--accent-w)}
.fb-g{background:rgba(74,222,128,0.2);color:var(--accent-g)}
.fb-r{background:rgba(248,113,113,0.2);color:var(--accent-r)}
/* Eliminazione */
.elim-section{margin-top:14px;padding:14px;background:rgba(255,255,255,0.03);border-radius:8px}
.elim-section-title{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.elim-match-live{background:rgba(255,255,255,0.05);border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.elim-match-title-live{font-size:10px;color:var(--txt2);font-weight:600;text-transform:uppercase;margin-bottom:6px}
.elim-team-live{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;font-weight:600}
.elim-team-live.win{color:#4ade80}
.elim-team-live.lose{opacity:.4}
.score-live{font-size:14px;font-weight:800;color:#fff}
/* Podium live */
.podium-live{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.podium-item{text-align:center;padding:10px 16px;border-radius:10px;min-width:100px}
.p1-live{background:linear-gradient(135deg,rgba(251,191,36,.3),rgba(253,224,71,.15));border:1px solid #fbbf24}
.p2-live{background:rgba(148,163,184,.15);border:1px solid #94a3b8}
.p3-live{background:rgba(205,124,58,.15);border:1px solid #cd7c3a}
.podium-trophy{font-size:20px}
.podium-nome-live{font-size:13px;font-weight:700;color:#fff;margin-top:4px}
.podium-rank-live{font-size:10px;color:var(--txt2);margin-top:2px}
/* No data */
.no-torneo{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.no-torneo h2{font-size:24px;color:var(--txt)}
.no-torneo p{font-size:14px;color:var(--txt2);text-align:center}
/* Aggiornamento */
.last-update{font-size:11px;color:var(--txt2)}
/* Scorrevole in cima */
.ticker{background:rgba(74,222,128,0.1);border-bottom:1px solid rgba(74,222,128,0.2);padding:6px 16px;font-size:12px;color:#4ade80;white-space:nowrap;overflow:hidden}

.footer-noemi{text-align:center;padding:40px 10px;font-family:sans-serif;font-size:.85em;color:var(--footer-text);animation:apparizione 1.5s ease-out;transition:color .3s}
.link-noemi{color:inherit;text-decoration:none;font-weight:600;border-bottom:1px solid currentColor}
@keyframes apparizione{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="live-header">
  <div>
    <div class="live-title">🏐 Classifiche Live</div>
    <div class="live-subtitle" id="liveSubtitle">Torneo Pallavolo</div>
  </div>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:6px"><span class="sync-dot" id="syncDot"></span><span class="sync-txt" id="syncTxt">Live</span></div>
    <span class="last-update" id="lastUpdate"></span>
    <select id="torneoSelect" style="padding:6px 10px;border-radius:8px;background:#1a1d27;color:#fff;border:1px solid var(--border);font-size:13px" onchange="setActiveTorneo(this.value)"></select>
  </div>
</div>
<div id="liveRoot"><div class="no-torneo"><h2>⏳</h2><p>Connessione in corso...</p></div></div>

<script>
let activeTorneoId=null;
let DB={tornei:{}};

function setSyncStatus(s){
  const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');
  if(s==='ok'){if(d){d.style.background='#4ade80';d.style.animation='pulse 2s infinite';}if(t)t.textContent='Live';}
  else{if(d){d.style.background='#f87171';d.style.animation='none';}if(t)t.textContent='Disconnesso';}
  const u=document.getElementById('lastUpdate');if(u)u.textContent='Aggiornato: '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function calcCl(g){
  const t=g.squadre.map((s,i)=>({i,nome:s.nome,soc:s.soc||'',pt:0,sv:0,sp:0,pv:0,pp:0}));
  for(const p of g.partite){if(p.s1h===''||p.s1a==='')continue;const s1h=parseInt(p.s1h)||0,s1a=parseInt(p.s1a)||0;const sets=p.sets||g.sets||2;const has2=sets===2&&p.s2h!=='';const s2h=has2?parseInt(p.s2h)||0:0,s2a=has2?parseInt(p.s2a)||0:0;const sh=(s1h>s1a?1:0)+(has2&&s2h>s2a?1:0);const sa=(s1a>s1h?1:0)+(has2&&s2a>s2h?1:0);t[p.h].pt+=sh;t[p.a].pt+=sa;t[p.h].sv+=sh;t[p.a].sv+=sa;t[p.h].sp+=sa;t[p.a].sp+=sh;t[p.h].pv+=s1h+(has2?s2h:0);t[p.a].pv+=s1a+(has2?s2a:0);t[p.h].pp+=s1a+(has2?s2a:0);t[p.a].pp+=s1h+(has2?s2h:0);}
  t.forEach(x=>{x.ds=x.sv-x.sp;x.dp=x.pv-x.pp});t.sort((a,b)=>b.pt-a.pt||b.ds-a.ds||b.dp-a.dp);return t;
}
function getWinner(m){if(!m||m.s1h===''||m.s1a==='')return null;return(parseInt(m.s1h)||0)>(parseInt(m.s1a)||0)?m.t1:m.t2;}
function getLoser(m){if(!m||m.s1h===''||m.s1a==='')return null;return(parseInt(m.s1h)||0)<=(parseInt(m.s1a)||0)?m.t1:m.t2;}

function setActiveTorneo(id){
  activeTorneoId=id;renderLive();
}

function renderLive(){
  if(!window._liveDB)return;
  DB=window._liveDB;
  const tornei=DB.tornei||{};
  const ids=Object.keys(tornei).sort((a,b)=>(tornei[b].createdAt||0)-(tornei[a].createdAt||0));

  // Popola select tornei
  const sel=document.getElementById('torneoSelect');
  if(sel){
    const curr=activeTorneoId||ids[0]||'';
    sel.innerHTML=ids.map(id=>`<option value="${id}"${id===curr?' selected':''}>${tornei[id].nome}</option>`).join('');
    if(!activeTorneoId&&ids.length)activeTorneoId=ids[0];
  }

  if(!activeTorneoId||!tornei[activeTorneoId]){
    document.getElementById('liveRoot').innerHTML=`<div class="no-torneo"><h2>📋</h2><p>Nessun torneo disponibile.<br>Crea un torneo dalla pagina principale.</p></div>`;
    return;
  }

  const torneo=tornei[activeTorneoId];
  document.getElementById('liveSubtitle').textContent=torneo.nome;
  document.title=`${torneo.nome} — Classifiche Live`;

  const cats=['white','green','red'];
  const catNames={white:'⬜ White',green:'🟩 Green',red:'🟥 Red'};
  const catAccents={white:'white',green:'green',red:'red'};
  const fbClass={white:'fb-w',green:'fb-g',red:'fb-r'};

  let html='<div class="live-body">';

  for(const cat of cats){
    const fasi=(torneo.cats?.[cat]?.fasi)||[];
    const gironiFase1=fasi[0]?.gironi||[];
    if(!gironiFase1.length&&fasi.length===0) continue;

    html+=`<div class="cat-section"><div class="cat-header ${catAccents[cat]}"><div class="cat-title ${catAccents[cat]}">${catNames[cat]}</div>`;

    // Conta gironi totali attivi
    const totGironi=fasi.reduce((s,f)=>s+(f.gironi?.length||0)+(f.tipo==='elim'?1:0),0);
    html+=`<span class="cat-count">${totGironi} gironi/fasi</span></div>`;

    html+=`<div class="gironi-grid">`;

    for(const fase of fasi){
      if(fase.tipo==='elim'){
        // Render eliminazione live
        const e=fase.elim||{};
        const hasQ=e.q1||e.q2||e.q3||e.q4;
        const wFin=getWinner(e.fin12),lFin=getLoser(e.fin12),wFin34=getWinner(e.fin34);

        html+=`<div class="girone-card" style="grid-column:1/-1"><div class="girone-card-header ${catAccents[cat]}"><span class="girone-label ${catAccents[cat]}">⚡ ${fase.label}</span></div>`;

        if(wFin){
          html+=`<div class="podium-live" style="padding:14px">
            <div class="podium-item p2-live"><div class="podium-trophy">🥈</div><div class="podium-nome-live">${lFin||'—'}</div><div class="podium-rank-live">2° posto</div></div>
            <div class="podium-item p1-live"><div class="podium-trophy">🥇</div><div class="podium-nome-live">${wFin}</div><div class="podium-rank-live">1° posto</div></div>
            <div class="podium-item p3-live"><div class="podium-trophy">🥉</div><div class="podium-nome-live">${wFin34||'—'}</div><div class="podium-rank-live">3° posto</div></div>
          </div>`;
        }

        html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:14px">`;

        function elimMatchHtml(m,title){
          if(!m)return'';const w=getWinner(m);const played=m.s1h!==''&&m.s1a!=='';
          return`<div class="elim-match-live"><div class="elim-match-title-live">${title}</div>
            <div class="elim-team-live${w===m.t1?' win':played?' lose':''}"><span>${m.t1||'—'}</span>${played?`<span class="score-live">${m.s1h}</span>`:''}</div>
            <div class="elim-team-live${w===m.t2?' win':played?' lose':''}"><span>${m.t2||'—'}</span>${played?`<span class="score-live">${m.s1a}</span>`:''}</div>
          </div>`;
        }

        if(hasQ){
          html+=`<div><div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;margin-bottom:8px">Quarti</div>`;
          ['q1','q2','q3','q4'].filter(k=>e[k]).forEach((k,i)=>{html+=elimMatchHtml(e[k],`Q${i+1}: ${['1°vs8°','2°vs7°','3°vs6°','4°vs5°'][i]}`);});
          html+=`</div>`;
        }
        html+=`<div><div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;margin-bottom:8px">Semifinali</div>${elimMatchHtml(e.sf1,'Semifinale 1')}${elimMatchHtml(e.sf2,'Semifinale 2')}</div>`;
        html+=`<div><div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;margin-bottom:8px">Finali</div>${elimMatchHtml(e.fin12,'Finale 1° - 2°')}${elimMatchHtml(e.fin34,'Finale 3° - 4°')}</div>`;
        html+=`</div></div>`;
      } else {
        // Render gironi normali
        for(const g of(fase.gironi||[])){
          const cl=calcCl(g);const sets=g.sets||2;
          const giocate=g.partite.filter(p=>p.s1h!==''&&p.s1a!=='').length;
          const tot=g.partite.length;
          html+=`<div class="girone-card"><div class="girone-card-header ${catAccents[cat]}">
            <span class="girone-label ${catAccents[cat]}">${fase.label} — Girone ${g.label}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="fase-badge ${fbClass[cat]}">${sets} set</span>
              <span class="girone-progress">${giocate}/${tot}</span>
            </div>
          </div>
          <table><thead><tr>
            <th style="width:24px">#</th>
            <th>Squadra</th>
            <th class="r">Pt</th>
            ${sets===2?'<th class="r">DS</th>':''}
            <th class="r">DP</th>
          </tr></thead><tbody>`;
          cl.forEach((t,i)=>{
            const rankC=i===0?'r1':i===1?'r2':i===2?'r3':'';
            html+=`<tr>
              <td class="rank ${rankC}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
              <td><div class="team-name">${t.nome}</div>${t.soc?`<div class="team-soc">${t.soc}</div>`:''}</td>
              <td class="r"><span class="pts ${catAccents[cat]}">${t.pt}</span></td>
              ${sets===2?`<td class="r"><span class="${t.ds>0?'ds-pos':t.ds<0?'ds-neg':''}">${t.ds>0?'+':''}${t.ds}</span></td>`:''}
              <td class="r" style="color:var(--txt2);font-size:12px">${t.dp>0?'+':''}${t.dp}</td>
            </tr>`;
          });
          html+=`</tbody></table></div>`;
        }
      }
    }
    html+=`</div></div>`;
  }

  html+=`</div>`;
  document.getElementById('liveRoot').innerHTML=html;
}

// Aggiornamento ogni 30 secondi per sicurezza
setInterval(()=>{if(window._liveDB)renderLive();},30000);
</script>

<footer class="footer-noemi">
  <p>Progetto e idea di <a href="mailto:tnoemi.marcolini@gmail.com" class="link-noemi">Noemi Marcolini</a></p>
</footer>
</body>
</html>
