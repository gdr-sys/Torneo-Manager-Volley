<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Torneo Pallavolo — Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getDatabase,ref,set,onValue,off,get}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const cfg={apiKey:"AIzaSyAI0RJEgV4n5kzJUxWbtn7S6mDeqQFcJu8",authDomain:"manager-torneo-pallavolo.firebaseapp.com",projectId:"manager-torneo-pallavolo",storageBucket:"manager-torneo-pallavolo.firebasestorage.app",messagingSenderId:"60737736156",appId:"1:60737736156:web:98d9e7f181c54676461319",databaseURL:"https://manager-torneo-pallavolo-default-rtdb.europe-west1.firebasedatabase.app"};
const app=initializeApp(cfg);
const db=getDatabase(app);
window._fbSet=(path,data)=>set(ref(db,path),data);
window._fbGet=async(path)=>{const s=await get(ref(db,path));return s.val();};
window._fbListen=(path,cb)=>{const r=ref(db,path);onValue(r,snap=>cb(snap.val()));return()=>off(r);};
window._fbReady=true;
document.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
:root{--bg:#f5f5f0;--card:#fff;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.26);--txt:#1a1a1a;--txt2:#555;--tab-act:#e8e5e0;--inp:#fff;--match:#fff;--saved-bg:#dcfce7;--saved-txt:#166534;--info:#ebebeb;--footer-text:rgba(0,0,0,0.6);}
[data-theme=dark]{--bg:#18181b;--card:#27272a;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.24);--txt:#f4f4f5;--txt2:#a1a1aa;--tab-act:#3f3f46;--inp:#3f3f46;--match:#2d2d31;--saved-bg:#14532d;--saved-txt:#86efac;--info:#3f3f46;--footer-text:rgba(255,255,255,0.6);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .2s,color .2s}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:600;color:var(--txt)}
.hdr p{font-size:12px;color:var(--txt2);margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.theme-btn,.icon-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:20px;background:var(--card);color:var(--txt);font-size:13px;cursor:pointer;white-space:nowrap}
.sync-badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:5px}
.sync-ok{background:#dcfce7;color:#166534}.sync-err{background:#fee2e2;color:#dc2626}.sync-wait{background:#fef9c3;color:#854d0e}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#166534}.dot-err{background:#dc2626}.dot-wait{background:#854d0e;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:1rem}
/* Tabs */
.tabs{display:flex;gap:4px;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:1.5rem;overflow-x:auto}
.tab{flex:1;min-width:70px;padding:8px 4px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);white-space:nowrap}
.tab.active{background:var(--tab-act);color:var(--txt)}
.tw.active{background:#dbeafe;color:#1e40af}.tg.active{background:#dcfce7;color:#166534}.tr2.active{background:#fee2e2;color:#991b1b}
/* Inputs */
select,input[type=text],input[type=number]{padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:14px;background:var(--inp);color:var(--txt);width:100%}
input.score{width:60px!important;min-width:60px;padding:10px 4px;font-size:22px;font-weight:700;text-align:center;border:2px solid var(--border2);border-radius:8px;background:var(--inp);color:var(--txt);-moz-appearance:textfield;appearance:textfield;-webkit-appearance:none;flex-shrink:0}
input.score::-webkit-inner-spin-button,input.score::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input.score:focus{border-color:#166534;outline:none}
/* Buttons */
button{padding:7px 14px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--txt);font-size:13px;cursor:pointer;transition:background .15s}
button:hover{background:var(--tab-act)}
.bp{background:var(--txt)!important;color:var(--bg)!important;border-color:transparent!important}.bp:hover{opacity:.85!important}
.bd{color:#dc2626!important;border-color:#fca5a5!important}.bd:hover{background:#fee2e2!important}
.bg{background:#166534!important;color:#fff!important;border-color:transparent!important}.bg:hover{background:#14532d!important}
.bsm{padding:5px 12px;font-size:12px}.bxsm{padding:3px 8px;font-size:11px}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 8px;color:var(--txt2);font-weight:500;font-size:12px;border-bottom:0.5px solid var(--border)}
td{padding:7px 8px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
.pos1{color:#b45309;font-weight:700}.pos2{color:#71717a;font-weight:700}.pos3{color:#92400e;font-weight:700}
.dsp{color:#166534;font-weight:500}.dsn{color:#dc2626;font-weight:500}
/* Badges */
.gbadge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block}
.bw{background:#dbeafe;color:#1e40af}.bg2{background:#dcfce7;color:#166534}.br2{background:#fee2e2;color:#991b1b}
.sec{font-size:12px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem}
/* Match cards */
.match-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--match)}
.match-teams{font-size:14px;font-weight:600;margin-bottom:12px;line-height:1.5;color:var(--txt)}
.soc-tag{font-size:11px;font-weight:400;color:var(--txt2)}
.set-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.set-lbl{font-size:12px;font-weight:500;color:var(--txt2);min-width:42px}
.sep{font-size:24px;font-weight:300;color:var(--txt2)}
.saved{font-size:13px;color:var(--saved-txt);background:var(--saved-bg);border-radius:8px;padding:6px 10px;margin-top:8px;text-align:center;font-weight:500}
.save-row{display:flex;gap:8px;margin-top:4px}
/* Layout */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.g2{grid-template-columns:1fr}}
.girone-box{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.girone-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:20px;transition:.2s}
.slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.slider{background:#166534}
input:checked+.slider:before{transform:translateX(18px)}
/* Elim bracket */
.bracket-round{margin-bottom:16px}
.bracket-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.bracket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.elim-card{border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--match)}
.elim-lbl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.elim-team{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-bottom:4px;background:var(--info);font-size:13px;font-weight:600;color:var(--txt)}
.elim-team.win{background:#dcfce7;color:#166534;border:1px solid #86efac}
.elim-team.lose{opacity:.4}
.elim-team .org{font-size:10px;font-weight:400;color:var(--txt2);margin-top:1px}
.elim-team.win .org{color:#166534}
/* Podium */
.podium-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.podium{border-radius:10px;padding:14px;text-align:center}
.p1{background:linear-gradient(135deg,#fef9c3,#fde047);border:1px solid #facc15}
.p2{background:linear-gradient(135deg,#f4f4f5,#d4d4d8);border:1px solid #a1a1aa}
.p3{background:linear-gradient(135deg,#fef3c7,#fcd34d);border:1px solid #f59e0b}
.podium-name{font-size:15px;font-weight:700;color:#1a1a1a}
.podium-lbl{font-size:11px;color:#555;margin-top:2px}
/* Builder */
.type-btn{flex:1;min-width:120px;padding:12px;border:2px solid var(--border2);border-radius:10px;background:var(--card);color:var(--txt);cursor:pointer;text-align:center;transition:all .15s}
.type-btn.sel{border-color:#166534;background:#dcfce7;color:#166534}
.type-btn h3{font-size:13px;font-weight:600;margin-bottom:4px}
.type-btn p{font-size:11px;color:var(--txt2);line-height:1.4}
.type-btn.sel p{color:#166534}
.fase2-box{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.team-chip{display:inline-flex;align-items:center;gap:5px;background:var(--info);border-radius:20px;padding:3px 10px;font-size:12px;margin:2px;color:var(--txt)}
.team-chip button{padding:0 3px;border:none;background:none;color:#dc2626;font-size:13px;cursor:pointer}
.pool-chip{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;margin:2px;color:var(--txt)}
.pool-chip.sel{background:#dcfce7;border-color:#166534;color:#166534}
.set-sel{padding:4px 8px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--inp);color:var(--txt);width:auto}
/* Tornei list */
.torneo-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.torneo-item:hover{background:var(--tab-act)}
.torneo-item.active-t{border-color:#166534;background:#dcfce7}
.torneo-nome{font-weight:600;font-size:15px}
.torneo-meta{font-size:12px;color:var(--txt2);margin-top:2px}
/* Società setup */
.soc-row{display:flex;gap:8px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;flex-wrap:wrap}
.soc-nome{font-weight:600;font-size:13px;flex:1;min-width:120px}
.cat-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.step-indicator{display:flex;gap:4px;margin-bottom:1.5rem}
.step{flex:1;height:4px;border-radius:2px;background:var(--border)}
.step.done{background:#166534}.step.current{background:#854d0e}

/* Footer */
.footer-noemi{text-align:center;padding:40px 10px;font-family:sans-serif;font-size:.85em;color:var(--footer-text);animation:apparizione 1.5s ease-out;transition:color .3s}
.link-noemi{color:inherit;text-decoration:none;font-weight:600;border-bottom:1px solid currentColor}
@keyframes apparizione{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* PIN overlay */
.pin-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.pin-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;max-width:360px;width:90%;text-align:center}
.pin-title{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--txt)}
.pin-subtitle{font-size:13px;color:var(--txt2);margin-bottom:1.5rem}
.pin-input{font-size:28px;font-weight:700;text-align:center;letter-spacing:8px;padding:12px;border:2px solid var(--border2);border-radius:10px;background:var(--inp);color:var(--txt);width:100%;margin-bottom:1rem;-webkit-text-security:disc}
.pin-input:focus{border-color:#166534;outline:none}
.pin-err{color:#dc2626;font-size:13px;margin-top:-8px;min-height:20px}
.pin-hint{font-size:11px;color:var(--txt2);margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="hdr">
      <h1>🏐 Torneo Pallavolo</h1>
      <p id="torneoNomeHdr">Nessun torneo selezionato</p>
    </div>
    <div class="topbar-right">
      <div class="sync-badge sync-wait" id="syncBadge"><span class="dot dot-wait" id="syncDot"></span><span id="syncTxt">Connessione...</span></div>
      <button class="icon-btn" onclick="goHome()" title="Lista tornei">🏠</button>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
  <div id="root"></div>
</div>
<script>
// ============================================================
// NOMI E RISERVE
// ============================================================
const RAW={white:["BIANCHI","GIALLI","ROSSI","BLU","VERDI","ARANCIONI","VIOLA","TURCHESI","LILLA","ROSA","CELESTE","BORDEAUX","SMERALDO","MAGENTA","BEIGE","CIANO","MAGENTA","INDACO","LILLA","LIME","CORALLO","AMBRA","ACQUA","SABBIA","GRIGI","CELESTE","BORDEAUX","OLIVA","ZAFFIRO"],green:["LEONI","TIGRI","PANTERE","LINCI","LUPI","ORSI","FALCHI","AQUILE","CERVI","VOLPI","GUFI","GHEPARDI","SCORPIONI","PUMA","FENICI","RONDINI","COBRA","RICCI","STAMBECCHI","SCOIATTOLI","CANGURI","GIRAFFE","CAMMELLI","CANARINI","CONIGLI","LINCE","GALLI","CAVALLO","ELEFANTI","SERPENTI"],red:["ONDE","MAREE","CORALLI","CONCHIGLIE","SCOGLI","PORTO","COSTA","ESTATE","MARE","RIVA","OMBRELLONE","PALMA","SPIAGGIA","FARO","BAIA","PALMA","CORALLINA","TAVOLE","SPONDE","PORTO","BANCHINA","BATTIGIA","SALSINE","FARO","BUSSOLA","LIDO","LAGUNA","SCOGLIERA"]};
const RISERVE={white:["OCRA","CREMISI","PERVINCA","AVORIO","VERMIGLIO","CARMINIO","EBANO","PLATINO","RUBINO","ACQUAMARINA","AMETISTA","TOPAZIO","MALACHITE","OSSIDIANA","COBALTO","TURCHESE","PESCA","CIPRIA","MUSCHIO","CAMMELLO"],green:["BUFALI","DELFINI","CIGNI","PELLICANI","IENE","BRADIPI","PINGUINI","FENICOTTERI","PAVONI","TUCANI","JAGUARI","CASTORI","PROCIONI","CAPIBARA","LEMURI","ALLIGATORI","STRUZZI","IPPOPOTAMI","RINOCERONTI","ZEBRE"],red:["ANCONA","PONENTE","RISACCA","DARSENA","INSENATURA","PROMONTORIO","APPRODO","BREZZA","GOLFO","CALETTA","DERIVA","NAVIGLIO","VELA","SCALO","ATTRACCO","MOLO","RADA","ESTUARIO","CANALE","BARCA"]};
function buildNames(raw,riserve){const used=new Set();const r=[];let ri=0;for(const n of raw){if(!used.has(n)){used.add(n);r.push(n);}else{while(ri<riserve.length&&used.has(riserve[ri]))ri++;const s=ri<riserve.length?riserve[ri++]:n+'*';used.add(s);r.push(s);}}return r;}
const NAMES={white:buildNames(RAW.white,RISERVE.white),green:buildNames(RAW.green,RISERVE.green),red:buildNames(RAW.red,RISERVE.red)};

// ============================================================
// STATO GLOBALE
// ============================================================
let PREFS={white:{sz:4,sets:2},green:{sz:4,sets:2},red:{sz:4,sets:2}};
const collapsed=new Set();
let isDark=false;
let fbReady=false;
let _writing=false;
let fbUnlisten=null;
let saveTimer=null;
let builderState=null;
let IC={}; // input cache
let view='home'; // home | torneo-setup | torneo
let localCat='white'; // local-only tab state, not synced
let currentTorneoId=null;

// Struttura dati principale
let DB={tornei:{}}; // {tornei: {id: {nome, createdAt, societa:[], cats:{white,green,red}}}}

// ============================================================
// FIREBASE
// ============================================================
function setSyncStatus(s,msg){
  const b=document.getElementById('syncBadge'),d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');
  if(!b)return;b.className='sync-badge sync-'+s;d.className='dot dot-'+s;t.textContent=msg;
}
function sv(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    if(fbReady&&window._fbSet){
      _writing=true;
      setSyncStatus('wait','Salvataggio...');
      window._fbSet('db',DB)
        .then(()=>{setSyncStatus('ok','🔴 Live');setTimeout(()=>{_writing=false;},1000);})
        .catch(()=>{setSyncStatus('err','Errore');_writing=false;lsv();});
    }else lsv();
  },500);
}
function lsv(){try{localStorage.setItem('tv_db',JSON.stringify(DB))}catch(e){}}
function lload(){try{const d=localStorage.getItem('tv_db');if(d){const p=JSON.parse(d);if(p&&p.tornei)DB=p;}}catch(e){}}
function azzeraDB(){
  if(!confirm('Cancellare TUTTI i tornei e i dati da Firebase? Questa operazione non è reversibile.'))return;
  DB={tornei:{}};
  localStorage.removeItem('tv_db');
  sv();
  goHome();
  alert('Database azzerato.');
}
lload();

document.addEventListener('firebase-ready',()=>{
  fbReady=true;setSyncStatus('wait','Caricamento...');
  fbUnlisten=window._fbListen('db',(data)=>{
    if(data&&data.tornei){
      DB=data;
      lsv();
      setSyncStatus('ok','🔴 Live');
    } else {
      setSyncStatus('ok','🔴 Live');
      // DB empty on Firebase - use local data
    }
    // Always render after Firebase responds (first load or update)
    if(!_writing){
      if(isPinOk()) render();
      else showPinOverlay();
    }
  });
});
setTimeout(()=>{if(!fbReady)setSyncStatus('err','Offline — locale');},6000);

// ============================================================
// UTILS
// ============================================================
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function toggleTheme(){isDark=!isDark;document.documentElement.setAttribute('data-theme',isDark?'dark':'light');document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';}
function toggleCollapse(fid){if(collapsed.has(fid))collapsed.delete(fid);else collapsed.add(fid);render();}
function goHome(){view='home';currentTorneoId=null;localCat='white';IC={};builderState=null;socEditState=null;document.getElementById('torneoNomeHdr').textContent='Nessun torneo selezionato';render();}
function currentTorneo(){return currentTorneoId?DB.tornei[currentTorneoId]:null;}
function catLabel(c){return c==='white'?'White':c==='green'?'Green':'Red';}
function badge(c){return c==='white'?'bw':c==='green'?'bg2':'br2';}

// ============================================================
// SHUFFLE NO-CONSEC
// ============================================================
function shuffleNoConsec(arr){
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  for(let t=0;t<50;t++){let ok=true;for(let i=1;i<a.length;i++){const p=a[i-1],c=a[i];if(p.h===c.h||p.h===c.a||p.a===c.h||p.a===c.a){let sw=false;for(let j=i+1;j<a.length;j++){const x=a[j];if(!(p.h===x.h||p.h===x.a||p.a===x.h||p.a===x.a)&&(j+1>=a.length||!(x.h===c.h||x.h===c.a||x.a===c.h||x.a===c.a))){[a[i],a[j]]=[a[j],a[i]];sw=true;break;}}if(!sw){ok=false;break;}}}if(ok)break;}
  return a;
}
function genPartite(n,ritorno,sets){
  const a=[];for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)a.push({h:i,a:j,leg:1,s1h:'',s1a:'',s2h:'',s2a:'',sets:sets||2});
  const sh=shuffleNoConsec(a);if(!ritorno)return sh;
  return[...sh,...sh.map(p=>({h:p.a,a:p.h,leg:2,s1h:'',s1a:'',s2h:'',s2a:'',sets:sets||2}))];
}

// ============================================================
// ASSEGNAZIONE SQUADRE CON DIVERSITÀ SOCIETÀ
// Algoritmo: distribuisce le squadre di ogni girone cercando
// di massimizzare il numero di società diverse per girone.
// ============================================================
function assegnaSquadre(cat,gironi,societa){
  // gironi = array di {n: numero squadre}
  // societa = array di {nome, squadre:[{nome,cat}]}
  // Costruisce lista squadre con società
  const pool=[];
  for(const s of societa){
    const sqCat=s.squadre.filter(sq=>sq.cat===cat);
    for(const sq of sqCat) pool.push({nome:sq.nome,soc:s.nome});
  }
  // Shuffle pool
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}

  const result=gironi.map(g=>({n:g.n,squadre:[]}));
  const remaining=[...pool];

  // Algoritmo greedy: per ogni slot, scegli la squadra che minimizza
  // il numero di squadre della stessa società già nel girone
  for(let round=0;remaining.length>0;round++){
    for(let gi=0;gi<result.length&&remaining.length>0;gi++){
      const girone=result[gi];
      if(girone.squadre.length>=girone.n) continue;
      const socInGirone=new Set(girone.squadre.map(s=>s.soc));
      // Preferisce squadre di società non ancora presenti
      const diverse=remaining.filter(s=>!socInGirone.has(s.soc));
      const candidates=diverse.length>0?diverse:remaining;
      // Prendi la prima candidate
      const chosen=candidates[0];
      girone.squadre.push(chosen);
      remaining.splice(remaining.indexOf(chosen),1);
    }
  }
  return result;
}

// ============================================================
// CALCOLO CLASSIFICA
// ============================================================
function calcCl(g){
  const t=g.squadre.map((s,i)=>({i,nome:s.nome,soc:s.soc||'',pt:0,sv:0,sp:0,pv:0,pp:0}));
  for(const p of g.partite){
    if(p.s1h===''||p.s1a==='')continue;
    const s1h=parseInt(p.s1h)||0,s1a=parseInt(p.s1a)||0;
    const sets=p.sets||g.sets||2;const has2=sets===2&&p.s2h!=='';
    const s2h=has2?parseInt(p.s2h)||0:0,s2a=has2?parseInt(p.s2a)||0:0;
    const sh=(s1h>s1a?1:0)+(has2&&s2h>s2a?1:0);const sa=(s1a>s1h?1:0)+(has2&&s2a>s2h?1:0);
    t[p.h].pt+=sh;t[p.a].pt+=sa;t[p.h].sv+=sh;t[p.a].sv+=sa;t[p.h].sp+=sa;t[p.a].sp+=sh;
    t[p.h].pv+=s1h+(has2?s2h:0);t[p.a].pv+=s1a+(has2?s2a:0);t[p.h].pp+=s1a+(has2?s2a:0);t[p.a].pp+=s1h+(has2?s2h:0);
  }
  t.forEach(x=>{x.ds=x.sv-x.sp;x.dp=x.pv-x.pp});
  t.sort((a,b)=>b.pt-a.pt||b.ds-a.ds||b.dp-a.dp);
  return t;
}

function classificaGenerale(gironi){
  const cls=gironi.map(g=>({label:g.label,cl:calcCl(g)}));
  const maxPos=Math.max(0,...cls.map(c=>c.cl.length-1));
  const res=[];
  for(let pos=0;pos<=maxPos;pos++){
    const gr=[];
    for(const{label,cl}of cls){const t=cl[pos];if(!t)continue;const qs=t.sp>0?t.sv/t.sp:t.sv;const qp=t.pp>0?t.pv/t.pp:t.pv;gr.push({...t,girone:label,pos,posLabel:`${pos+1}° Girone ${label}`,qs,qp});}
    gr.sort((a,b)=>Math.abs(b.qs-a.qs)>0.001?b.qs-a.qs:b.qp-a.qp);
    res.push(...gr);
  }
  return res;
}

function buildElimStruct(top8){
  const n=top8.length;const nm=i=>top8[i]?.nome||'?';const lb=i=>top8[i]?.posLabel||'?';const e={};
  if(n>=4){e.q1={t1:nm(0),t2:nm(Math.min(7,n-1)),da1:lb(0),da2:lb(Math.min(7,n-1)),s1h:'',s1a:''};e.q2={t1:nm(1),t2:nm(Math.min(6,n-2)),da1:lb(1),da2:lb(Math.min(6,n-2)),s1h:'',s1a:''};e.q3={t1:nm(2),t2:nm(Math.min(5,n-3)),da1:lb(2),da2:lb(Math.min(5,n-3)),s1h:'',s1a:''};e.q4={t1:nm(3),t2:nm(Math.min(4,n-4)),da1:lb(3),da2:lb(Math.min(4,n-4)),s1h:'',s1a:''};e.sf1={t1:'Vincente Q1',t2:'Vincente Q4',s1h:'',s1a:''};e.sf2={t1:'Vincente Q2',t2:'Vincente Q3',s1h:'',s1a:''};}
  else if(n>=2){e.sf1={t1:nm(0),t2:nm(Math.min(3,n-1)),da1:lb(0),da2:lb(Math.min(3,n-1)),s1h:'',s1a:''};e.sf2={t1:nm(1),t2:nm(Math.min(2,n-2)),da1:lb(1),da2:lb(Math.min(2,n-2)),s1h:'',s1a:''};}
  e.fin12={t1:'Vincente SF1',t2:'Vincente SF2',s1h:'',s1a:''};e.fin34={t1:'Perdente SF1',t2:'Perdente SF2',s1h:'',s1a:''};
  return e;
}

function getWinner(m){if(!m||m.s1h===''||m.s1a==='')return null;return(parseInt(m.s1h)||0)>(parseInt(m.s1a)||0)?m.t1:m.t2;}
function getLoser(m){if(!m||m.s1h===''||m.s1a==='')return null;return(parseInt(m.s1h)||0)<=(parseInt(m.s1a)||0)?m.t1:m.t2;}
function propagateElim(fase){
  const e=fase.elim;if(!e)return;
  if(e.q1&&e.q2&&e.sf1){const w1=getWinner(e.q1),w2=getWinner(e.q2);if(w1)e.sf1.t1=w1;if(w2)e.sf2&&(e.sf2.t1=w2);}
  if(e.q3&&e.q4){const w4=getWinner(e.q4),w3=getWinner(e.q3);if(w4&&e.sf1)e.sf1.t2=w4;if(w3&&e.sf2)e.sf2.t2=w3;}
  if(e.sf1&&e.sf2){const ws1=getWinner(e.sf1),ws2=getWinner(e.sf2),ls1=getLoser(e.sf1),ls2=getLoser(e.sf2);if(e.fin12){if(ws1)e.fin12.t1=ws1;if(ws2)e.fin12.t2=ws2;}if(e.fin34){if(ls1)e.fin34.t1=ls1;if(ls2)e.fin34.t2=ls2;}}
}

function exportTorneo(){

  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);

  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function importTorneo(){

    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();

      try{
        const data=JSON.parse(ev.target.result);
        const t=data.torneo||data;
        if(!t.nome)throw new Error('File non valido');

}

// Aggiunge girone con assegnazione automatica squadre+società
function addGirone(cat){
  const t=currentTorneo();
  if(!t){alert('Nessun torneo aperto.');return;}
  // Ensure cats structure exists
  if(!t.cats)t.cats={white:{fasi:[]},green:{fasi:[]},red:{fasi:[]}};
  if(!t.cats[cat])t.cats[cat]={fasi:[]};
  if(!t.cats[cat].fasi)t.cats[cat].fasi=[];
  // Ensure fase1 exists
  if(!t.cats[cat].fasi.length)t.cats[cat].fasi.push({id:uid(),label:'Fase 1',gironi:[]});
  const f1=t.cats[cat].fasi[0];
  if(!f1.gironi)f1.gironi=[];
  // Read from select if available, else use PREFS
  const szEl=document.getElementById('sz_'+cat);const setsEl=document.getElementById('sets_'+cat);
  if(szEl)PREFS[cat].sz=parseInt(szEl.value)||PREFS[cat].sz;
  if(setsEl)PREFS[cat].sets=parseInt(setsEl.value)||PREFS[cat].sets;
  const sz=PREFS[cat].sz;const sets=PREFS[cat].sets;
  const fasi=t.cats[cat].fasi;

  // Nomi già usati nei gironi esistenti
  const usedNomi=fasi.flatMap(f=>f.gironi?.flatMap(g=>g.squadre.map(s=>s.nome))||[]);
  const availNomi=NAMES[cat].filter(n=>!usedNomi.includes(n));

  // Quante squadre per società in questa categoria e girone
  const label=String.fromCharCode(65+f1.gironi.length);

  // Costruisce la squadra con la società
  // Prima determina quante squadre ogni società ha ancora da assegnare
  const socSquadre=[];
  for(const soc of(t.societa||[])){
    const nCat=soc.sqPerCat?.[cat]||0;
    if(!nCat)continue;
    // Quante ne ha già in gironi esistenti
    const giaAssegnate=fasi.flatMap(f=>f.gironi?.flatMap(g=>g.squadre.filter(s=>s.soc===soc.nome))||[]).length;
    const rimanenti=nCat-giaAssegnate;
    for(let i=0;i<rimanenti;i++) socSquadre.push({soc:soc.nome});
  }

  // Distribuisce in modo da massimizzare diversità
  let squadre=[];
  if(socSquadre.length>0){
    // Shuffle
    for(let i=socSquadre.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[socSquadre[i],socSquadre[j]]=[socSquadre[j],socSquadre[i]];}
    // Greedy: riempi il girone con max diversità
    const socInGirone=new Set();const remaining=[...socSquadre];
    for(let slot=0;slot<sz&&remaining.length>0;slot++){
      const diverse=remaining.filter(s=>!socInGirone.has(s.soc));
      const pick=(diverse.length>0?diverse:remaining)[0];
      socInGirone.add(pick.soc);
      remaining.splice(remaining.indexOf(pick),1);
      squadre.push({nome:availNomi[squadre.length]||`Sq${squadre.length+1}`,soc:pick.soc});
    }
    // Se non abbastanza squadre da società, riempi con vuote
    while(squadre.length<sz)squadre.push({nome:availNomi[squadre.length]||`Sq${squadre.length+1}`,soc:''});
  } else {
    // Nessuna info società: usa solo nomi
    squadre=Array.from({length:sz},(_,i)=>({nome:availNomi[i]||`Sq${i+1}`,soc:''}));
  }

  f1.gironi.push({id:uid(),label,squadre,sets,ritorno:false,partite:genPartite(sz,false,sets)});
  sv();render();
}

function delGirone(cat,fid,gv){const f=getFase(cat,fid);if(f)f.gironi=f.gironi.filter(g=>g.id!==gv);sv();render();}

function saveSquadre(cat,fid,gv){const g=getGirone(cat,fid,gv);if(!g)return;g.partite=genPartite(g.squadre.length,g.ritorno||false,g.sets||2);sv();render();}
function toggleRitorno(cat,fid,gv){const g=getGirone(cat,fid,gv);if(!g)return;g.ritorno=!g.ritorno;const old={};g.partite.filter(p=>p.leg===1||!p.leg).forEach(p=>{old[`${p.h}_${p.a}`]=p});const np=genPartite(g.squadre.length,g.ritorno,g.sets||2);np.forEach(p=>{if(p.leg===1){const o=old[`${p.h}_${p.a}`];if(o){p.s1h=o.s1h;p.s1a=o.s1a;p.s2h=o.s2h;p.s2a=o.s2a;}}});g.partite=np;sv();render();}

function saveElim(cat,fid,mk){const f=getFase(cat,fid);if(!f||!f.elim)return;const m=f.elim[mk];if(!m)return;['s1h','s1a'].forEach(field=>{const k=`elim_${fid}_${mk}_${field}`;if(IC[k]!==undefined)m[field]=IC[k];});propagateElim(f);sv();render();}

function renderGironeContent(cat,fase,g,b){
  const cl=calcCl(g);const sets=g.sets||2;const andataP=g.partite.filter(p=>!p.leg||p.leg===1);const ritornoP=g.partite.filter(p=>p.leg===2);const giocate=g.partite.filter(p=>p.s1h!==''&&p.s1a!=='').length;
  let clHtml=`<table><thead><tr><th>#</th><th>Squadra</th><th>Soc</th><th>Pt</th>${sets===2?'<th>Sv</th><th>Sp</th><th>DS</th>':''}<th>DP</th></tr></thead><tbody>`;
  cl.forEach((tt,i)=>{clHtml+=`<tr><td class="${i===0?'pos1':i===1?'pos2':i===2?'pos3':''}" style="font-weight:700">${i+1}</td><td style="font-weight:500">${tt.nome}</td><td style="font-size:11px;color:var(--txt2)">${tt.soc||''}</td><td style="font-weight:700;font-size:15px">${tt.pt}</td>${sets===2?`<td>${tt.sv}</td><td>${tt.sp}</td><td class="${tt.ds>0?'dsp':tt.ds<0?'dsn':''}">${tt.ds>0?'+':''}${tt.ds}</td>`:''}<td class="${tt.dp>0?'dsp':tt.dp<0?'dsn':''}">${tt.dp>0?'+':''}${tt.dp}</td></tr>`;});
  clHtml+=`</tbody></table><p style="font-size:11px;color:var(--txt2);margin-top:6px">Pt=set vinti${sets===2?' · DS=diff set':''} · DP=diff punti</p>`;
  function rPL(pList){return pList.map(p=>{
    const pid=g.partite.indexOf(p);const hn=g.squadre[p.h].nome,an=g.squadre[p.a].nome;const hs=g.squadre[p.h].soc||'',as=g.squadre[p.a].soc||'';const played=p.s1h!==''&&p.s1a!=='';const V=(f,sv2)=>getV(cat,fase.id,g.id,pid,f,sv2);
    return`<div class="match-card">${p.leg===2?`<div style="font-size:10px;background:#fef9c3;color:#854d0e;border-radius:4px;padding:2px 8px;display:inline-block;margin-bottom:8px;font-weight:600">RITORNO</div>`:''}
      <div class="match-teams">${hn}<span class="soc-tag"> (${hs||'—'})</span><br><span style="font-weight:400;color:var(--txt2);font-size:12px">vs</span><br>${an}<span class="soc-tag"> (${as||'—'})</span></div>
      <div class="set-row"><span class="set-lbl">Set 1</span><input type="number" class="score" inputmode="numeric" value="${V('s1h',p.s1h)}" placeholder="0" oninput="onInput('${cat}','${fase.id}','${g.id}',${pid},'s1h',this.value)"><span class="sep">–</span><input type="number" class="score" inputmode="numeric" value="${V('s1a',p.s1a)}" placeholder="0" oninput="onInput('${cat}','${fase.id}','${g.id}',${pid},'s1a',this.value)"></div>
      ${sets===2?`<div class="set-row"><span class="set-lbl">Set 2</span><input type="number" class="score" inputmode="numeric" value="${V('s2h',p.s2h)}" placeholder="0" oninput="onInput('${cat}','${fase.id}','${g.id}',${pid},'s2h',this.value)"><span class="sep">–</span><input type="number" class="score" inputmode="numeric" value="${V('s2a',p.s2a)}" placeholder="0" oninput="onInput('${cat}','${fase.id}','${g.id}',${pid},'s2a',this.value)"></div>`:''}
      <div class="save-row"><button class="bp" style="flex:1;padding:8px;font-size:13px;font-weight:600" onclick="saveResult('${cat}','${fase.id}','${g.id}',${pid})">✓ Salva</button>${played?`<button style="padding:8px 14px;font-size:13px" class="bd" onclick="clearResult('${cat}','${fase.id}','${g.id}',${pid})">✕</button>`:''}</div>
      ${played?`<div class="saved">✓ Set1: ${p.s1h}–${p.s1a}${sets===2&&p.s2h!==''?' | Set2: '+p.s2h+'–'+p.s2a:''}</div>`:''}
    </div>`;}).join('');}
  return`<div class="girone-box"><div class="girone-hdr">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="gbadge ${b}">Girone ${g.label}</span><span style="font-size:12px;color:var(--txt2)">${giocate}/${g.partite.length} partite · ${sets} set</span></div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px"><label class="toggle"><input type="checkbox" ${g.ritorno?'checked':''} onchange="toggleRitorno('${cat}','${fase.id}','${g.id}')"><span class="slider"></span></label><span style="font-size:13px;color:var(--txt2)">A/R</span></div>
      <button class="bg bsm" onclick="exportPDF('${cat}','${fase.id}','${g.id}')">📄 PDF</button>
    </div></div>
    <div class="g2"><div><div class="sec">Classifica</div>${clHtml}</div><div><div class="sec">Partite${g.ritorno?' — Andata':''}</div>${rPL(andataP)}${ritornoP.length?`<div class="sec" style="margin-top:14px">Ritorno</div>${rPL(ritornoP)}`:''}</div></div>
  </div>`;
}

function renderElimMatch(cat,fid,mk,m,title){
  if(!m)return'';const w=getWinner(m);const played=m.s1h!==''&&m.s1a!=='';
  return`<div class="elim-card"><div class="elim-lbl">${title}</div>
    <div class="elim-team${w===m.t1?' win':played?' lose':''}"><div><div>${m.t1||'—'}</div>${m.da1?`<div class="org">${m.da1}</div>`:''}</div>${w===m.t1?'🏆':''}</div>
    <div class="elim-team${w===m.t2?' win':played?' lose':''}"><div><div>${m.t2||'—'}</div>${m.da2?`<div class="org">${m.da2}</div>`:''}</div>${w===m.t2?'🏆':''}</div>
    <div class="set-row" style="margin-top:10px"><span class="set-lbl">Set 1</span><input type="number" class="score" inputmode="numeric" value="${getVElim(fid,mk,'s1h',m.s1h||'')}" placeholder="0" oninput="onInputElim('${fid}','${mk}','s1h',this.value)"><span class="sep">–</span><input type="number" class="score" inputmode="numeric" value="${getVElim(fid,mk,'s1a',m.s1a||'')}" placeholder="0" oninput="onInputElim('${fid}','${mk}','s1a',this.value)"></div>
    <button class="bp bsm" style="width:100%;margin-top:6px" onclick="saveElim('${cat}','${fid}','${mk}')">✓ Salva</button>
    ${played?`<div class="saved" style="margin-top:6px">✓ Vince ${w}</div>`:''}
  </div>`;
}
function renderElimBlock(cat,fase){
  const e=fase.elim||{};propagateElim(fase);const hasQ=e.q1||e.q2||e.q3||e.q4;const wF=getWinner(e.fin12),lF=getLoser(e.fin12),wF34=getWinner(e.fin34);
  let html='';
  if(wF){html+=`<div class="podium-grid"><div class="podium p2" style="margin-top:20px"><div style="font-size:28px">🥈</div><div class="podium-name">${lF||'—'}</div><div class="podium-lbl">2° posto</div></div><div class="podium p1"><div style="font-size:28px">🥇</div><div class="podium-name">${wF}</div><div class="podium-lbl">1° posto</div></div><div class="podium p3" style="margin-top:30px"><div style="font-size:28px">🥉</div><div class="podium-name">${wF34||'—'}</div><div class="podium-lbl">3° posto</div></div></div>`;}
  if(hasQ){html+=`<div class="bracket-round"><div class="bracket-title">⚡ Quarti di Finale</div><div class="bracket-grid">${['q1','q2','q3','q4'].filter(k=>e[k]).map((k,i)=>renderElimMatch(cat,fase.id,k,e[k],`Quarto ${i+1}: ${['1°vs8°','2°vs7°','3°vs6°','4°vs5°'][i]}`)).join('')}</div></div>`;}
  html+=`<div class="bracket-round"><div class="bracket-title">🏅 Semifinali</div><div class="bracket-grid">${renderElimMatch(cat,fase.id,'sf1',e.sf1,'Semifinale 1')}${renderElimMatch(cat,fase.id,'sf2',e.sf2,'Semifinale 2')}</div></div>`;
  html+=`<div class="bracket-round"><div class="bracket-title">🏆 Finali</div><div class="bracket-grid">${renderElimMatch(cat,fase.id,'fin12',e.fin12,'Finale 1° - 2° posto')}${renderElimMatch(cat,fase.id,'fin34',e.fin34,'Finale 3° - 4° posto')}</div></div>`;
  return html;
}

// ============================================================
// BUILDER FASE SUCCESSIVA
// ============================================================
function openBuilder(cat){
  const fasi=getFasi(cat);const last=fasi[fasi.length-1];
  if(!last||!last.gironi?.length){alert('Prima crea almeno un girone.');return;}
  const generale=classificaGenerale(last.gironi);const top8=generale.slice(0,8);const dal9=generale.slice(8);
  builderState={cat,gironi:last.gironi,generale,top8,dal9,mode:'entrambi',gironiSets:PREFS[cat].sets,maxGironi:2,draft:buildDraftGironi(dal9,2)};render();
}
function buildDraftGironi(squadre,maxG){if(!squadre.length)return[];const nG=Math.min(maxG,Math.max(1,Math.floor(squadre.length/2)));const draft=Array.from({length:nG},(_,i)=>({label:String.fromCharCode(65+i),squadre:[]}));squadre.forEach((tt,i)=>draft[i%nG].squadre.push({nome:tt.nome,soc:tt.soc||'',posLabel:tt.posLabel}));return draft.filter(g=>g.squadre.length>=2);}
function setBuilderMode(m){if(!builderState)return;builderState.mode=m;if(m==='gironi')builderState.draft=buildDraftGironi(builderState.generale,builderState.maxGironi);else builderState.draft=buildDraftGironi(builderState.dal9,builderState.maxGironi);render();}
function setMaxGironi(n){if(!builderState)return;builderState.maxGironi=n;builderState.draft=buildDraftGironi(builderState.mode==='gironi'?builderState.generale:builderState.dal9,n);render();}
function builderAddTeam(nome,soc,posLabel,gi){if(!builderState)return;builderState.draft.forEach(g=>{g.squadre=g.squadre.filter(s=>s.nome!==nome)});if(gi>=0&&gi<builderState.draft.length)builderState.draft[gi].squadre.push({nome,soc,posLabel});render();}
function builderAddGirone2(){if(!builderState)return;builderState.draft.push({label:String.fromCharCode(65+builderState.draft.length),squadre:[]});render();}
function builderRemoveGirone2(i){if(!builderState)return;builderState.draft.splice(i,1);render();}
function builderRemoveTeam2(gi,nome){if(!builderState)return;builderState.draft[gi].squadre=builderState.draft[gi].squadre.filter(s=>s.nome!==nome);render();}
function builderCancel(){builderState=null;render();}
function builderConfirm(){
  if(!builderState)return;const cat=builderState.cat;const fasi=getFasi(cat);const{mode,top8,dal9,draft,gironiSets,generale,maxGironi}=builderState;
  const prevFase=fasi[fasi.length-1];if(prevFase)collapsed.add(prevFase.id);
  if(mode==='gironi'){const allDraft=buildDraftGironi(generale,maxGironi);const valid=allDraft.filter(g=>g.squadre.length>=2);if(!valid.length){alert('Nessun girone valido.');return;}fasi.push({id:uid(),label:`Fase ${fasi.length+1}`,tipo:'gironi',gironi:valid.map((d,i)=>({id:uid(),label:String.fromCharCode(65+i),squadre:d.squadre.map(s=>({nome:s.nome,soc:s.soc})),sets:gironiSets,ritorno:false,partite:genPartite(d.squadre.length,false,gironiSets)}))});}
  else if(mode==='quarti'){fasi.push({id:uid(),label:'Fase eliminazione',tipo:'elim',gironi:[],elim:buildElimStruct(generale.slice(0,8))});}
  else{if(dal9.length>=2){const valid=draft.filter(g=>g.squadre.length>=2);if(valid.length)fasi.push({id:uid(),label:`Fase ${fasi.length+1} — Gironi (dal 9°)`,tipo:'gironi',gironi:valid.map((d,i)=>({id:uid(),label:String.fromCharCode(65+i),squadre:d.squadre.map(s=>({nome:s.nome,soc:s.soc})),sets:gironiSets,ritorno:false,partite:genPartite(d.squadre.length,false,gironiSets)}))});}fasi.push({id:uid(),label:'Fase eliminazione (Top 8)',tipo:'elim',gironi:[],elim:buildElimStruct(top8)});}
  builderState=null;sv();render();
}

function renderBuilder(b){
  if(!builderState)return'';const{mode,top8,dal9,draft,gironiSets,maxGironi,generale}=builderState;const totSq=generale.length;const pool=mode==='gironi'?generale:dal9;
  let html=`<div class="card"><div class="card-title">Nuova fase</div><p style="font-size:13px;color:var(--txt2);margin-bottom:1rem">Squadre totali: <strong>${totSq}</strong></p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem">
      <div class="type-btn${mode==='gironi'?' sel':''}" onclick="setBuilderMode('gironi')"><h3>🏆 Solo gironi</h3><p>Tutte le ${totSq} squadre in gironi</p></div>
      <div class="type-btn${mode==='quarti'?' sel':''}" onclick="setBuilderMode('quarti')"><h3>⚡ Solo eliminazione</h3><p>Top ${Math.min(8,totSq)} → elim diretta</p></div>
      <div class="type-btn${mode==='entrambi'?' sel':''}" onclick="setBuilderMode('entrambi')"><h3>🔀 Entrambi</h3><p>Top 8 → elim · Dal 9° → gironi</p></div>
    </div>
    <div style="background:var(--info);border-radius:8px;padding:12px;margin-bottom:12px">
      <div class="sec">Classifica generale — ordine selezione</div>
      <div style="font-size:11px;color:var(--txt2);margin-bottom:8px">Tutti i 1° (per Q.Set) → migliori 2° → migliori 3°, ecc.</div>
      <table><thead><tr><th>#</th><th>Squadra</th><th>Soc</th><th>Da</th><th>Q.Set</th><th>Destino</th></tr></thead><tbody>
      ${generale.map((tt,i)=>`<tr style="${i<8?'background:rgba(254,249,195,0.3)':''}"><td style="font-weight:700;color:${i<8?'#854d0e':'#166534'}">${i+1}</td><td style="font-weight:600">${tt.nome}</td><td style="font-size:11px;color:var(--txt2)">${tt.soc||''}</td><td style="font-size:11px;color:var(--txt2)">${tt.posLabel}</td><td>${tt.sp>0?(tt.sv/tt.sp).toFixed(2):tt.sv}</td><td style="font-size:11px;font-weight:700;color:${i<8?'#854d0e':'#166534'}">${i<8?(mode==='gironi'?'🏆':'⚡ Elim'):(mode==='quarti'?'—':'🏆 Girone')}</td></tr>`).join('')}
      </tbody></table>
    </div>`;
  if((mode==='entrambi'&&dal9.length>=2)||mode==='gironi'){
    html+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <div class="sec" style="margin:0">Gironi${mode==='entrambi'?' (dal 9°)':''}:</div>
      <select class="set-sel" onchange="setMaxGironi(parseInt(this.value))">${[1,2,3,4,5,6].map(n=>`<option value="${n}"${maxGironi===n?' selected':''}>${n} giron${n===1?'e':'i'}</option>`).join('')}</select>
      <div class="sec" style="margin:0">Set:</div>
      <select class="set-sel" onchange="builderState.gironiSets=parseInt(this.value)"><option value="1"${gironiSets===1?' selected':''}>1 set</option><option value="2"${gironiSets===2?' selected':''}>2 set</option></select>
    </div>
    ${draft.map((g,gi)=>`<div class="fase2-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px"><span class="gbadge ${b}">Girone ${g.label} — ${g.squadre.length} sq</span><button class="bxsm bd" onclick="builderRemoveGirone2(${gi})">✕</button></div>
      <div style="min-height:28px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px">${g.squadre.length?g.squadre.map(s=>`<span class="team-chip">${s.nome}${s.soc?` <span style="opacity:.6;font-size:10px">(${s.soc})</span>`:''} <span style="font-size:10px;opacity:.5">${s.posLabel||''}</span><button onclick="builderRemoveTeam2(${gi},'${s.nome.replace(/'/g,"\\'")}')">×</button></span>`).join(''):'<span style="font-size:12px;color:var(--txt2)">Nessuna squadra</span>'}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${pool.filter(tt=>!g.squadre.find(s=>s.nome===tt.nome)).map(tt=>`<button class="bxsm" onclick="builderAddTeam('${tt.nome.replace(/'/g,"\\'")}','${(tt.soc||'').replace(/'/g,"\\'")}','${(tt.posLabel||'').replace(/'/g,"\\'")}',${gi})">${tt.nome}${tt.soc?` <span style="opacity:.5">(${tt.soc})</span>`:''}</button>`).join('')}</div>
    </div>`).join('')}
    <button class="bsm" style="margin-top:4px" onclick="builderAddGirone2()">+ Aggiungi girone</button>`;
  }
  html+=`<div style="display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end"><button onclick="builderCancel()">Annulla</button><button class="bp" onclick="builderConfirm()">✓ Crea fase</button></div></div>`;
  return html;
}

// ============================================================
// PIN AUTHENTICATION
// ============================================================
const PIN_KEY='torneo_pin_ok';
const DEFAULT_PIN='1234'; // PIN di default — cambialo dal pannello admin

function isPinOk(){
  // Controlla sessione (valida per 8 ore)
  const saved=sessionStorage.getItem(PIN_KEY);
  if(!saved)return false;
  try{const{ok,ts}=JSON.parse(saved);return ok&&(Date.now()-ts)<8*60*60*1000;}catch{return false;}
}

function showPinOverlay(){
  const o=document.getElementById('pinOverlay');
  if(o){o.style.display='flex';setTimeout(()=>document.getElementById('pinInput')?.focus(),100);}
}

function checkPin(){
  const input=document.getElementById('pinInput')?.value||'';
  const correctPin=DB._pin||DEFAULT_PIN;
  if(input===correctPin){
    sessionStorage.setItem(PIN_KEY,JSON.stringify({ok:true,ts:Date.now()}));
    const overlay=document.getElementById('pinOverlay');
    if(overlay) overlay.style.display='none';
    render();
  } else {
    const err=document.getElementById('pinErr');
    if(err) err.textContent='PIN non corretto. Riprova.';
    const inp=document.getElementById('pinInput');
    if(inp){inp.value='';inp.focus();}
  }
}

function requirePin(){
  if(!isPinOk()){showPinOverlay();return false;}
  return true;
}

function changePin(){
  const newPin=prompt('Inserisci il nuovo PIN (solo numeri, min 4 cifre):');
  if(!newPin||newPin.length<4||!/^\d+$/.test(newPin)){alert('PIN non valido. Usa almeno 4 cifre numeriche.');return;}
  const confirm2=prompt('Conferma il nuovo PIN:');
  if(newPin!==confirm2){alert('I PIN non coincidono.');return;}
  DB._pin=newPin;sv();alert('PIN aggiornato!');
}

function render(){
  const root=document.getElementById('root');
  if(!root)return;
  if(view==='home') root.innerHTML=renderHome();
  else if(view==='torneo-setup') root.innerHTML=renderTorneoSetup();
  else if(view==='torneo') root.innerHTML=renderTorneo();
}
// Render immediately on load - don't wait for Firebase
if(isPinOk()){
  render(); // show home with local data while Firebase loads
} else {
  // Show PIN - render behind it too so it's ready
  render();
  showPinOverlay();
}
</script>

    <div class="pin-title">🏐 Torneo Pallavolo</div>

    <input class="pin-input" type="password" inputmode="numeric" maxlength="6" id="pinInput" placeholder="• • • •" onkeydown="if(event.key==='Enter')checkPin()" oninput="document.getElementById('pinErr').textContent=''">
    <div class="pin-err" id="pinErr"></div>
    <button class="bp" style="width:100%;padding:12px;font-size:15px" onclick="checkPin()">Accedi</button>
    <div class="pin-hint">PIN dimenticato? Contatta l'organizzatore.</div>
  </div>
</div>
