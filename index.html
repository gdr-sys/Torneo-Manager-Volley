<!DOCTYPE html>
<html lang="it" data-theme="light"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#f5f5f0;--card:#fff;--border:rgba(0,0,0,0.13);--border2:rgba(0,0,0,0.28);--txt:#1a1a1a;--txt2:#555;--tab-active:#e8e5e0;--input-bg:#fff;--match-bg:#fff;--match-border:rgba(0,0,0,0.10);--saved-bg:#dcfce7;--saved-txt:#166534;--info-bg:#ebebeb;--avulsa-bg:#ebebeb;}
[data-theme="dark"]{--bg:#18181b;--card:#27272a;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.25);--txt:#f4f4f5;--txt2:#a1a1aa;--tab-active:#3f3f46;--input-bg:#3f3f46;--match-bg:#2d2d31;--match-border:rgba(255,255,255,0.10);--saved-bg:#14532d;--saved-txt:#86efac;--info-bg:#3f3f46;--avulsa-bg:#3f3f46;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui);background:var(--bg);color:var(--txt);transition:background .2s,color .2s;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.hdr h1{font-size:20px;font-weight:600;color:var(--txt)}
.hdr p{font-size:12px;color:var(--txt2);margin-top:2px}
.theme-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:20px;background:var(--card);color:var(--txt);font-size:13px;cursor:pointer;white-space:nowrap}
.tabs{display:flex;gap:4px;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:1.5rem}
.tab{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);transition:background .15s}
.tab.active{background:var(--tab-active);color:var(--txt)}
.tw.active{background:#dbeafe;color:#1e40af}
.tg.active{background:#dcfce7;color:#166534}
.tr2.active{background:#fee2e2;color:#991b1b}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
select,input[type=text]{padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:14px;background:var(--input-bg);color:var(--txt);width:100%}
input.score{width:60px!important;min-width:60px;padding:10px 4px;font-size:22px;font-weight:700;text-align:center;border:2px solid var(--border2);border-radius:8px;background:var(--input-bg);color:var(--txt);-moz-appearance:textfield;appearance:textfield;-webkit-appearance:none;flex-shrink:0}
input.score::-webkit-outer-spin-button,input.score::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.score:focus{border-color:#166534;outline:none}
button{padding:7px 14px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--txt);font-size:13px;cursor:pointer;transition:background .15s}
button:hover{background:var(--tab-active)}
.bp{background:var(--txt)!important;color:var(--bg)!important;border-color:transparent!important}.bp:hover{opacity:.85!important}
.bd{color:#dc2626!important;border-color:#fca5a5!important}.bd:hover{background:#fee2e2!important}
.bgreen{background:#166534!important;color:#fff!important;border-color:transparent!important;font-weight:600}.bgreen:hover{background:#14532d!important}
.bsm{padding:5px 12px;font-size:12px}.bxsm{padding:3px 8px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 8px;color:var(--txt2);font-weight:500;font-size:12px;border-bottom:0.5px solid var(--border)}
td{padding:7px 8px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
.gbadge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block}
.bw{background:#dbeafe;color:#1e40af}.bg2{background:#dcfce7;color:#166534}.br2{background:#fee2e2;color:#991b1b}
.sec{font-size:12px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem}
.match-card{border:1px solid var(--match-border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--match-bg)}
.match-teams{font-size:14px;font-weight:600;margin-bottom:12px;line-height:1.5;color:var(--txt)}
.match-vs{font-weight:400;color:var(--txt2);font-size:12px}
.set-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.set-row-label{font-size:12px;font-weight:500;color:var(--txt2);min-width:42px}
.score-sep{font-size:24px;font-weight:300;color:var(--txt2)}
.saved-res{font-size:13px;color:var(--saved-txt);background:var(--saved-bg);border-radius:8px;padding:6px 10px;margin-top:8px;text-align:center;font-weight:500}
.save-row{display:flex;gap:8px;margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.g2{grid-template-columns:1fr}}
.pos1{color:#b45309;font-weight:700}.pos2{color:#71717a;font-weight:700}.pos3{color:#92400e;font-weight:700}
.dsp{color:#166534;font-weight:500}.dsn{color:#dc2626;font-weight:500}
.fase-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.girone-box{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.girone-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.team-chip{display:inline-flex;align-items:center;gap:6px;background:var(--info-bg);border-radius:20px;padding:4px 10px;font-size:12px;margin:3px;color:var(--txt)}
.team-chip button{padding:0 4px;border:none;background:none;color:#dc2626;font-size:14px;cursor:pointer}
.pool-chip{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;margin:2px;color:var(--txt);transition:background .15s}
.pool-chip.sel{background:#dcfce7;border-color:#166534;color:#166534}
.fase2-box{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:20px;transition:.2s}
.slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.slider{background:#166534}
input:checked+.slider:before{transform:translateX(18px)}
.bracket-round{margin-bottom:16px}
.bracket-round-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.bracket-matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.elim-card{border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--match-bg)}
.elim-title{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.elim-team{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-bottom:4px;background:var(--info-bg);font-size:13px;font-weight:600;color:var(--txt)}
.elim-team.winner{background:#dcfce7;color:#166534;border:1px solid #86efac}
.elim-team.loser{opacity:.45}
.elim-team .origin{font-size:10px;font-weight:400;color:var(--txt2);margin-top:2px}
.elim-team.winner .origin{color:#166534}
.trophy{font-size:28px;text-align:center;margin-bottom:4px}
.podium-box{border-radius:10px;padding:14px;text-align:center;margin-bottom:10px}
.podium-1{background:linear-gradient(135deg,#fef9c3,#fde047);border:1px solid #facc15}
.podium-2{background:linear-gradient(135deg,#f4f4f5,#d4d4d8);border:1px solid #a1a1aa}
.podium-3{background:linear-gradient(135deg,#fef3c7,#fcd34d);border:1px solid #f59e0b}
.podium-name{font-size:16px;font-weight:700;color:#1a1a1a}
.podium-label{font-size:11px;color:#555;margin-top:2px}
.type-btn{flex:1;min-width:130px;padding:12px;border:2px solid var(--border2);border-radius:10px;background:var(--card);color:var(--txt);cursor:pointer;text-align:center;transition:all .15s}
.type-btn.sel{border-color:#166534;background:#dcfce7;color:#166534}
.type-btn h3{font-size:13px;font-weight:600;margin-bottom:4px}
.type-btn p{font-size:11px;color:var(--txt2);line-height:1.4}
.type-btn.sel p{color:#166534}
.dest-box{border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.8;margin-bottom:10px}
.dest-quarti{background:#fef9c3;border:1px solid #fde047;color:#854d0e}
.dest-gironi{background:#dcfce7;border:1px solid #86efac;color:#166534}
.dest-chip{display:inline-block;background:rgba(0,0,0,0.08);border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;margin:1px}
/* Collassa */
.fase-collapsed{cursor:pointer;user-select:none}
.fase-collapsed:hover .fase-toggle-hint{opacity:1}
.fase-toggle-hint{opacity:.5;font-size:11px;margin-left:6px}
.set-sel{padding:4px 8px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--input-bg);color:var(--txt);width:auto}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="hdr"><h1>🏐 Torneo Pallavolo</h1><p>Gestione gironi, classifiche e fasi multiple</p></div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Scuro</button>
  </div>
  <div class="tabs">
    <button class="tab tw" onclick="setCat('white')">⬜ White</button>
    <button class="tab tg" onclick="setCat('green')">🟩 Green</button>
    <button class="tab tr2" onclick="setCat('red')">🟥 Red</button>
    <button class="tab active" onclick="setCat('admin')">⚙️ Setup</button>
  </div>
  <div id="root"></div>
</div>
<script>
const RAW={
  white:["BIANCHI","GIALLI","ROSSI","BLU","VERDI","ARANCIONI","VIOLA","TURCHESI","LILLA","ROSA","CELESTE","BORDEAUX","SMERALDO","MAGENTA","BEIGE","CIANO","MAGENTA","INDACO","LILLA","LIME","CORALLO","AMBRA","ACQUA","SABBIA","GRIGI","CELESTE","BORDEAUX","OLIVA","ZAFFIRO"],
  green:["LEONI","TIGRI","PANTERE","LINCI","LUPI","ORSI","FALCHI","AQUILE","CERVI","VOLPI","GUFI","GHEPARDI","SCORPIONI","PUMA","FENICI","RONDINI","COBRA","RICCI","STAMBECCHI","SCOIATTOLI","CANGURI","GIRAFFE","CAMMELLI","CANARINI","CONIGLI","LINCE","GALLI","CAVALLO","ELEFANTI","SERPENTI"],
  red:["ONDE","MAREE","CORALLI","CONCHIGLIE","SCOGLI","PORTO","COSTA","ESTATE","MARE","RIVA","OMBRELLONE","PALMA","SPIAGGIA","FARO","BAIA","PALMA","CORALLINA","TAVOLE","SPONDE","PORTO","BANCHINA","BATTIGIA","SALSINE","FARO","BUSSOLA","LIDO","LAGUNA","SCOGLIERA"]
};
const RISERVE={
  white:["OCRA","CREMISI","PERVINCA","AVORIO","VERMIGLIO","CARMINIO","EBANO","PLATINO","RUBINO","ACQUAMARINA","AMETISTA","TOPAZIO","MALACHITE","OSSIDIANA","COBALTO"],
  green:["BUFALI","DELFINI","CIGNI","PELLICANI","IENE","BRADIPI","PINGUINI","FENICOTTERI","PAVONI","TUCANI","JAGUARI","CASTORI","PROCIONI","CAPIBARA","LEMURI"],
  red:["ANCONA","PONENTE","RISACCA","DARSENA","INSENATURA","PROMONTORIO","APPRODO","BREZZA","GOLFO","CALETTA","DERIVA","NAVIGLIO","VELA","SCALO","ATTRACCO"]
};
function buildNames(raw,riserve){const used=new Set();const r=[];let ri=0;for(const n of raw){if(!used.has(n)){used.add(n);r.push(n);}else{while(ri<riserve.length&&used.has(riserve[ri]))ri++;const s=ri<riserve.length?riserve[ri++]:n+'*';used.add(s);r.push(s);}}return r;}
const NAMES={white:buildNames(RAW.white,RISERVE.white),green:buildNames(RAW.green,RISERVE.green),red:buildNames(RAW.red,RISERVE.red)};
const PREFS={white:{sz:4,sets:2},green:{sz:4,sets:2},red:{sz:4,sets:2}};
// Fasi collassate: set di fase.id
const collapsed=new Set();

let isDark=false;
function toggleTheme(){isDark=!isDark;document.documentElement.setAttribute('data-theme',isDark?'dark':'light');document.getElementById('themeBtn').textContent=isDark?'☀️ Chiaro':'🌙 Scuro';}

let S={cat:'admin',cats:{white:{fasi:[]},green:{fasi:[]},red:{fasi:[]}}};
const IC={};let builderState=null;
function sv(){try{localStorage.setItem('tv13',JSON.stringify(S))}catch(e){}}
function lv(){try{const d=localStorage.getItem('tv13');if(d){const p=JSON.parse(d);if(p.cats)S.cats=p.cats}}catch(e){}}
lv();
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

function shuffleNoConsec(arr){
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  for(let t=0;t<40;t++){let ok=true;for(let i=1;i<a.length;i++){const p=a[i-1],c=a[i];if(p.h===c.h||p.h===c.a||p.a===c.h||p.a===c.a){let sw=false;for(let j=i+1;j<a.length;j++){const x=a[j];if(!(p.h===x.h||p.h===x.a||p.a===x.h||p.a===x.a)&&(j+1>=a.length||!(x.h===c.h||x.h===c.a||x.a===c.h||x.a===c.a))){[a[i],a[j]]=[a[j],a[i]];sw=true;break;}}if(!sw){ok=false;break;}}}if(ok)break;}
  return a;
}
function genPartiteRandom(n,ritorno,sets){
  const a=[];for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)a.push({h:i,a:j,leg:1,s1h:'',s1a:'',s2h:'',s2a:'',sets:sets||2});
  const sh=shuffleNoConsec(a);if(!ritorno)return sh;
  return[...sh,...sh.map(p=>({h:p.a,a:p.h,leg:2,s1h:'',s1a:'',s2h:'',s2a:'',sets:sets||2}))];
}
function calcCl(g){
  const t=g.squadre.map((s,i)=>({i,nome:s.nome,soc:s.soc||'',pt:0,sv:0,sp:0,pv:0,pp:0}));
  for(const p of g.partite){if(p.s1h===''||p.s1a==='')continue;const s1h=parseInt(p.s1h)||0,s1a=parseInt(p.s1a)||0;const sets=p.sets||g.sets||2;const has2=sets===2&&p.s2h!=='';const s2h=has2?parseInt(p.s2h)||0:0,s2a=has2?parseInt(p.s2a)||0:0;const sh=(s1h>s1a?1:0)+(has2&&s2h>s2a?1:0);const sa=(s1a>s1h?1:0)+(has2&&s2a>s2h?1:0);t[p.h].pt+=sh;t[p.a].pt+=sa;t[p.h].sv+=sh;t[p.a].sv+=sa;t[p.h].sp+=sa;t[p.a].sp+=sh;t[p.h].pv+=s1h+(has2?s2h:0);t[p.a].pv+=s1a+(has2?s2a:0);t[p.h].pp+=s1a+(has2?s2a:0);t[p.a].pp+=s1h+(has2?s2h:0);}
  t.forEach(x=>{x.ds=x.sv-x.sp;x.dp=x.pv-x.pp});t.sort((a,b)=>b.pt-a.pt||b.ds-a.ds||b.dp-a.dp);return t;
}

// Classifica generale combinata di tutti i gironi di una fase
// Ordine: prima per posizione nel girone (tutti i 1°, poi i migliori 2° per avulsa, poi i migliori 3° ecc.)
function classificaGenerale(gironi){
  const byPos=[];
  const maxPos=Math.max(...gironi.map(g=>g.squadre.length-1));
  for(let pos=0;pos<=maxPos;pos++){
    const gruppo=[];
    for(const g of gironi){
      const cl=calcCl(g);
      if(cl[pos]){
        const t=cl[pos];
        // Quoziente set e punti per avulsa
        const qs=t.sp>0?t.sv/t.sp:(t.sv||0);
        const qp=t.pp>0?t.pv/t.pp:(t.pv||0);
        gruppo.push({...t,girone:g.label,pos,qs,qp});
      }
    }
    // Ordina il gruppo per avulsa: qs desc, qp desc
    gruppo.sort((a,b)=>b.qs-a.qs||b.qp-a.qp);
    byPos.push(...gruppo);
  }
  return byPos; // array ordinato dal 1° classificato assoluto in poi
}

function getFasi(cat){if(!S.cats[cat].fasi)S.cats[cat].fasi=[];return S.cats[cat].fasi}
function getFase(cat,fid){return getFasi(cat).find(f=>f.id===fid)}
function getGirone(cat,fid,gv){return getFase(cat,fid)?.gironi.find(g=>g.id===gv)}
function icKey(cat,fid,gv,pid,f){return`${cat}_${fid}_${gv}_${pid}_${f}`}
function onInput(cat,fid,gv,pid,f,v){IC[icKey(cat,fid,gv,pid,f)]=v}
function getV(cat,fid,gv,pid,f,saved){const k=icKey(cat,fid,gv,pid,f);return IC[k]!==undefined?IC[k]:saved}
function setCat(c){S.cat=c;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab')[{white:0,green:1,red:2,admin:3}[c]]?.classList.add('active');render();}
function toggleCollapse(fid){if(collapsed.has(fid))collapsed.delete(fid);else collapsed.add(fid);render();}
function getWinner(m){if(!m||m.s1h===''||m.s1a==='')return null;return(parseInt(m.s1h)||0)>(parseInt(m.s1a)||0)?m.t1:m.t2;}
function getLoser(m){if(!m||m.s1h===''||m.s1a==='')return null;return(parseInt(m.s1h)||0)<=(parseInt(m.s1a)||0)?m.t1:m.t2;}

// ---- PDF ----
function exportPDF(cat,fid,gv){
  const fase=getFase(cat,fid),g=getGirone(cat,fid,gv);if(!g||!fase)return;
  if(!window.jspdf){alert('Libreria PDF non caricata.');return;}
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=15;const catLabel=cat==='white'?'White':cat==='green'?'Green':'Red';
  const CR=cat==='white'?[30,64,175]:cat==='green'?[22,101,52]:[153,27,27];
  const CL=cat==='white'?[219,234,254]:cat==='green'?[220,252,231]:[254,226,226];
  const cl=calcCl(g);const sets=g.sets||2;
  const andataP=g.partite.filter(p=>!p.leg||p.leg===1);const ritornoP=g.partite.filter(p=>p.leg===2);
  let y=M;
  doc.setFillColor(...CR);doc.rect(0,0,W,26,'F');doc.setTextColor(255,255,255);doc.setFontSize(17);doc.setFont('helvetica','bold');doc.text(`Torneo Pallavolo — ${catLabel}`,M,12);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`${fase.label}  ·  Girone ${g.label}  ·  ${g.squadre.length} squadre  ·  ${g.ritorno?'A/R':'Solo andata'}  ·  ${sets} set`,M,21);y=32;
  function secTitle(t2){doc.setFillColor(...CL);doc.rect(M,y,W-M*2,7,'F');doc.setTextColor(...CR);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(t2.toUpperCase(),M+3,y+5);doc.setTextColor(30,30,30);y+=10;}
  function tHead(cols){doc.setFillColor(245,245,245);doc.rect(M,y,W-M*2,6,'F');doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(100,100,100);let x=M+2;cols.forEach(c=>{doc.text(c.t,c.r?x+c.w-2:x,y+4.5,{align:c.r?'right':'left'});x+=c.w});doc.setTextColor(30,30,30);y+=6;}
  function chk(n=12){if(y+n>285){doc.addPage();y=M;}}
  secTitle('Squadre');tHead([{t:'#',w:10},{t:'Squadra',w:80},{t:'Società',w:W-M*2-90}]);
  g.squadre.forEach((s,i)=>{chk();if(i%2===0){doc.setFillColor(250,250,250);doc.rect(M,y,W-M*2,6,'F');}doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(String(i+1),M+2,y+4.5);doc.setFont('helvetica','bold');doc.text(s.nome,M+12,y+4.5);doc.setFont('helvetica','normal');doc.text(s.soc||'—',M+92,y+4.5);y+=6;});y+=5;
  chk(20);secTitle('Classifica');
  tHead(sets===2?[{t:'#',w:10},{t:'Squadra',w:60},{t:'Pt',w:14,r:true},{t:'Sv',w:12,r:true},{t:'Sp',w:12,r:true},{t:'DS',w:14,r:true},{t:'DP',w:14,r:true}]:[{t:'#',w:10},{t:'Squadra',w:70},{t:'Pt',w:14,r:true},{t:'DP',w:14,r:true}]);

function addGirone(cat){
  const fasi=getFasi(cat);if(!fasi.length)fasi.push({id:uid(),label:'Fase 1',gironi:[]});
  const f1=fasi[0];const sz=PREFS[cat].sz;const sets=PREFS[cat].sets;
  const used=fasi.flatMap(f=>f.gironi?.flatMap(g=>g.squadre.map(s=>s.nome))||[]);
  const avail=NAMES[cat].filter(n=>!used.includes(n));
  const label=String.fromCharCode(65+f1.gironi.length);
  f1.gironi.push({id:uid(),label,squadre:Array.from({length:sz},(_,i)=>({nome:avail[i]||`Sq${i+1}`,soc:''})),sets,ritorno:false,partite:genPartiteRandom(sz,false,sets)});
  sv();render();
}
function delGirone(cat,fid,gv){const f=getFase(cat,fid);if(f)f.gironi=f.gironi.filter(g=>g.id!==gv);sv();render();}
function updSq(cat,fid,gv,idx,field,val){const g=getGirone(cat,fid,gv);if(g)g.squadre[idx][field]=val;}
function saveSquadre(cat,fid,gv){const g=getGirone(cat,fid,gv);if(!g)return;g.partite=genPartiteRandom(g.squadre.length,g.ritorno||false,g.sets||2);sv();render();}
function toggleRitorno(cat,fid,gv){
  const g=getGirone(cat,fid,gv);if(!g)return;g.ritorno=!g.ritorno;
  const old={};g.partite.filter(p=>p.leg===1||!p.leg).forEach(p=>{old[`${p.h}_${p.a}`]=p});
  const np=genPartiteRandom(g.squadre.length,g.ritorno,g.sets||2);
  np.forEach(p=>{if(p.leg===1){const o=old[`${p.h}_${p.a}`];if(o){p.s1h=o.s1h;p.s1a=o.s1a;p.s2h=o.s2h;p.s2a=o.s2a;}}});
  g.partite=np;sv();render();
}
function saveResult(cat,fid,gv,pid){const g=getGirone(cat,fid,gv);if(!g)return;const p=g.partite[pid];['s1h','s1a','s2h','s2a'].forEach(f=>{const k=icKey(cat,fid,gv,pid,f);if(IC[k]!==undefined)p[f]=IC[k]});sv();render();}
function clearResult(cat,fid,gv,pid){const g=getGirone(cat,fid,gv);if(!g)return;const p=g.partite[pid];p.s1h='';p.s1a='';p.s2h='';p.s2a='';['s1h','s1a','s2h','s2a'].forEach(f=>delete IC[icKey(cat,fid,gv,pid,f)]);sv();render();}
function delFase(cat,fid){if(!confirm('Eliminare questa fase?'))return;S.cats[cat].fasi=getFasi(cat).filter(f=>f.id!==fid);sv();render();}
function saveElim(cat,fid,mk){const f=getFase(cat,fid);if(!f||!f.elim)return;const m=f.elim[mk];if(!m)return;['s1h','s1a'].forEach(field=>{const k=`elim_${fid}_${mk}_${field}`;if(IC[k]!==undefined)m[field]=IC[k];});propagateElim(f);sv();render();}
function onInputElim(fid,mk,field,val){IC[`elim_${fid}_${mk}_${field}`]=val;}
function getVElim(fid,mk,field,saved){const k=`elim_${fid}_${mk}_${field}`;return IC[k]!==undefined?IC[k]:saved;}
function propagateElim(fase){
  const e=fase.elim;if(!e)return;
  if(e.q1&&e.q2&&e.sf1){const w1=getWinner(e.q1),w2=getWinner(e.q2);if(w1)e.sf1.t1=w1;if(w2)e.sf1.t2=w2;}
  if(e.q3&&e.q4&&e.sf2){const w3=getWinner(e.q3),w4=getWinner(e.q4);if(w3)e.sf2.t1=w3;if(w4)e.sf2.t2=w4;}
  // Se no quarti, sf dirette
  if(!e.q1&&e.sf1&&e.sf2){}
  if(e.sf1&&e.sf2){const ws1=getWinner(e.sf1),ws2=getWinner(e.sf2),ls1=getLoser(e.sf1),ls2=getLoser(e.sf2);if(e.fin12){if(ws1)e.fin12.t1=ws1;if(ws2)e.fin12.t2=ws2;}if(e.fin34){if(ls1)e.fin34.t1=ls1;if(ls2)e.fin34.t2=ls2;}}
}

function renderElimBlock(cat,fase){
  const e=fase.elim||{};propagateElim(fase);
  const hasQ=e.q1||e.q2||e.q3||e.q4;
  const wFin=getWinner(e.fin12),lFin=getLoser(e.fin12),wFin34=getWinner(e.fin34);
  let html='';
  if(wFin){html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div class="podium-box podium-2" style="margin-top:20px"><div class="trophy">🥈</div><div class="podium-name">${lFin||'—'}</div><div class="podium-label">2° posto</div></div><div class="podium-box podium-1"><div class="trophy">🥇</div><div class="podium-name">${wFin}</div><div class="podium-label">1° posto</div></div><div class="podium-box podium-3" style="margin-top:30px"><div class="trophy">🥉</div><div class="podium-name">${wFin34||'—'}</div><div class="podium-label">3° posto</div></div></div>`;}
  if(hasQ){html+=`<div class="bracket-round"><div class="bracket-round-title">⚡ Quarti di Finale</div><div class="bracket-matches">${['q1','q2','q3','q4'].filter(k=>e[k]).map((k,i)=>renderElimMatch(cat,fase.id,k,e[k],`Quarto ${i+1}`)).join('')}</div></div>`;}
  html+=`<div class="bracket-round"><div class="bracket-round-title">🏅 Semifinali</div><div class="bracket-matches">${renderElimMatch(cat,fase.id,'sf1',e.sf1,'Semifinale 1')}${renderElimMatch(cat,fase.id,'sf2',e.sf2,'Semifinale 2')}</div></div>`;
  html+=`<div class="bracket-round"><div class="bracket-round-title">🏆 Finali</div><div class="bracket-matches">${renderElimMatch(cat,fase.id,'fin12',e.fin12,'Finale 1° - 2° posto')}${renderElimMatch(cat,fase.id,'fin34',e.fin34,'Finale 3° - 4° posto')}</div></div>`;
  return html;
}

// ---- BUILDER ----
function openBuilder(cat){
  const fasi=getFasi(cat);const last=fasi[fasi.length-1];
  if(!last||!last.gironi?.length){alert('Prima crea almeno un girone.');return;}
  const gironi=last.gironi;
  // Classifica generale combinata
  const generale=classificaGenerale(gironi);
  // Top 8 per eliminazione, dal 9° per gironi
  const top8=generale.slice(0,8);
  const dal9=generale.slice(8);
  // Draft default gironi: raggruppa dal 9° in base al numero di gironi scelto (default 2)
  builderState={cat,gironi,generale,top8,dal9,mode:'entrambi',gironiSets:PREFS[cat].sets,maxGironi:2,draft:[]};
  builderState.draft=buildDraftGironi(dal9,2);
  render();
}

function buildDraftGironi(squadre,maxG){
  if(!squadre.length)return[];
  const nG=Math.min(maxG,Math.floor(squadre.length/2)||1);
  const draft=Array.from({length:nG},(_,i)=>({label:String.fromCharCode(65+i),squadre:[]}));
  squadre.forEach((t,i)=>draft[i%nG].squadre.push({nome:t.nome,soc:t.soc||'',posLabel:t.posLabel||(t.girone?`${t.pos+1}° Girone ${t.girone}`:'')}));
  return draft.filter(g=>g.squadre.length>=2);
}

function setBuilderMode(m){if(!builderState)return;builderState.mode=m;render();}
function setMaxGironi(n){
  if(!builderState)return;builderState.maxGironi=n;
  builderState.draft=buildDraftGironi(builderState.dal9,n);render();
}
function builderAddTeam(nome,soc,posLabel,gi){
  if(!builderState)return;
  builderState.draft.forEach(g=>{g.squadre=g.squadre.filter(s=>s.nome!==nome)});
  if(gi>=0&&gi<builderState.draft.length)builderState.draft[gi].squadre.push({nome,soc,posLabel});
  render();
}
function builderAddGirone2(){if(!builderState)return;builderState.draft.push({label:String.fromCharCode(65+builderState.draft.length),squadre:[]});render();}
function builderRemoveGirone2(i){if(!builderState)return;builderState.draft.splice(i,1);render();}
function builderRemoveTeam2(gi,nome){if(!builderState)return;builderState.draft[gi].squadre=builderState.draft[gi].squadre.filter(s=>s.nome!==nome);render();}
function builderCancel(){builderState=null;render();}

function buildElimStruct(top8){
  // top8 = array ordinato: [1°ass, 2°ass, 3°ass, ...]
  // Tabellone incrociato: Q1: 1° vs 8°, Q2: 2° vs 7°, Q3: 3° vs 6°, Q4: 4° vs 5°
  function nm(i){return top8[i]?.nome||'?';}
  function lb(i){const t=top8[i];return t?(t.pos!==undefined?`${t.pos+1}° Girone ${t.girone}`:''):'?';}
  const n=top8.length;
  const elim={};
  if(n>=4){
    elim.q1={t1:nm(0),t2:nm(7<n?7:n-1),da1:lb(0),da2:lb(7<n?7:n-1),s1h:'',s1a:''};
    elim.q2={t1:nm(1),t2:nm(6<n?6:n-2),da1:lb(1),da2:lb(6<n?6:n-2),s1h:'',s1a:''};
    elim.q3={t1:nm(2),t2:nm(5<n?5:n-3),da1:lb(2),da2:lb(5<n?5:n-3),s1h:'',s1a:''};
    elim.q4={t1:nm(3),t2:nm(4<n?4:n-4),da1:lb(3),da2:lb(4<n?4:n-4),s1h:'',s1a:''};
    elim.sf1={t1:'Vincente Q1',t2:'Vincente Q4',s1h:'',s1a:''};
    elim.sf2={t1:'Vincente Q2',t2:'Vincente Q3',s1h:'',s1a:''};
  } else if(n>=2){
    elim.sf1={t1:nm(0),t2:nm(n>=4?3:n-1),da1:lb(0),da2:lb(n>=4?3:n-1),s1h:'',s1a:''};
    elim.sf2={t1:nm(1),t2:nm(n>=4?2:n-2),da1:lb(1),da2:lb(n>=4?2:n-2),s1h:'',s1a:''};
  }
  elim.fin12={t1:'Vincente SF1',t2:'Vincente SF2',s1h:'',s1a:''};
  elim.fin34={t1:'Perdente SF1',t2:'Perdente SF2',s1h:'',s1a:''};
  return elim;
}

function builderConfirm(){
  if(!builderState)return;
  const cat=builderState.cat;const fasi=getFasi(cat);
  const{mode,top8,dal9,draft,gironiSets,generale}=builderState;

  // Collassa la fase precedente
  const prevFase=fasi[fasi.length-1];
  if(prevFase)collapsed.add(prevFase.id);

  if(mode==='gironi'){
    // Tutti in gironi
    const allDraft=buildDraftGironi(generale,builderState.maxGironi);
    const valid=allDraft.filter(g=>g.squadre.length>=2);
    if(!valid.length){alert('Serve almeno 2 squadre per girone.');return;}
    fasi.push({id:uid(),label:`Fase ${fasi.length+1}`,tipo:'gironi',gironi:valid.map((d,i)=>({id:uid(),label:String.fromCharCode(65+i),squadre:d.squadre.map(s=>({nome:s.nome,soc:s.soc})),sets:gironiSets,ritorno:false,partite:genPartiteRandom(d.squadre.length,false,gironiSets)}))});
  } else if(mode==='quarti'){
    // Solo eliminazione con tutti
    fasi.push({id:uid(),label:'Fase eliminazione',tipo:'elim',gironi:[],elim:buildElimStruct(generale.slice(0,8))});
  } else {
    // Entrambi: top8 → elim, dal 9° → gironi (due fasi separate)
    if(dal9.length>=2){
      const valid=draft.filter(g=>g.squadre.length>=2);
      if(valid.length){
        fasi.push({id:uid(),label:`Fase ${fasi.length+1} — Gironi classifica (dal 9°)`,tipo:'gironi',gironi:valid.map((d,i)=>({id:uid(),label:String.fromCharCode(65+i),squadre:d.squadre.map(s=>({nome:s.nome,soc:s.soc})),sets:gironiSets,ritorno:false,partite:genPartiteRandom(d.squadre.length,false,gironiSets)}))});
        collapsed.add(fasi[fasi.length-1].id); // collassa anche i gironi classifica di default? No, lasciamo aperti
      }
    }
    fasi.push({id:uid(),label:'Fase eliminazione (Top 8)',tipo:'elim',gironi:[],elim:buildElimStruct(top8)});
  }
  builderState=null;sv();render();
}

function renderBuilder(badge){
  if(!builderState)return'';
  const{mode,top8,dal9,draft,gironiSets,maxGironi,generale}=builderState;
  const totSq=generale.length;

  let html=`<div class="card">
    <div style="font-size:16px;font-weight:600;color:var(--txt);margin-bottom:4px">Nuova fase</div>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:1rem">Scegli come strutturare la fase successiva. Squadre totali: <strong>${totSq}</strong></p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem">
      <div class="type-btn${mode==='gironi'?' sel':''}" onclick="setBuilderMode('gironi')"><h3>🏆 Solo gironi</h3><p>Tutte le ${totSq} squadre in gironi di classifica</p></div>
      <div class="type-btn${mode==='quarti'?' sel':''}" onclick="setBuilderMode('quarti')"><h3>⚡ Solo eliminazione</h3><p>Le migliori ${Math.min(8,totSq)} in quarti/semifinali/finali</p></div>
      <div class="type-btn${mode==='entrambi'?' sel':''}" onclick="setBuilderMode('entrambi')"><h3>🔀 Entrambi</h3><p>Top 8 → eliminazione · Dal 9° → gironi classifica</p></div>
    </div>`;

  // Classifica generale sempre visibile
  html+=`<div style="background:var(--info-bg);border-radius:8px;padding:12px;margin-bottom:12px">
    <div class="sec">Classifica generale combinata</div>
    <table><thead><tr><th>#</th><th>Squadra</th><th>Girone</th><th>Q.Set</th><th>Destino</th></tr></thead><tbody>
    ${generale.map((t,i)=>`<tr style="${i<8?'background:rgba(254,249,195,0.3)':''}">
      <td style="font-weight:700">${i+1}</td>
      <td style="font-weight:500">${t.nome}</td>
      <td><span class="gbadge ${badge}" style="font-size:10px">${t.girone}</span></td>
      <td>${t.sp>0?(t.sv/t.sp).toFixed(2):t.sv}</td>
      <td style="font-size:11px;font-weight:600;color:${i<8?'#854d0e':'#166534'}">${i<8?(mode==='gironi'?'girone':'⚡ Quarti'):(mode==='quarti'?'🔑 Elim':'🏆 Girone')}</td>
    </tr>`).join('')}
    </tbody></table>
  </div>`;

  if(mode==='entrambi'){
    html+=`<div class="dest-box dest-quarti"><strong>⚡ Eliminazione diretta (Top 8)</strong><br>
      ${top8.map((t,i)=>`<span class="dest-chip">${i+1}. ${t.nome} <span style="opacity:.7">(${t.pos+1}° Girone ${t.girone})</span></span>`).join(' ')}
    </div>`;
    if(dal9.length){
      html+=`<div class="dest-box dest-gironi"><strong>🏆 Gironi classifica (dal 9° in poi) — ${dal9.length} squadre</strong><br>
        ${dal9.map((t,i)=>`<span class="dest-chip">${i+9}. ${t.nome}</span>`).join(' ')}
      </div>`;
    } else {
      html+=`<div class="dest-box dest-gironi" style="opacity:.6">Nessuna squadra dal 9° in poi.</div>`;
    }
  }

  if((mode==='gironi'||mode==='entrambi')&&(mode==='gironi'?generale.length:dal9.length)>=2){
    const pool=mode==='gironi'?generale:dal9;
    const assigned=new Set(draft.flatMap(g=>g.squadre.map(s=>s.nome)));
    html+=`<div style="display:flex;align-items:center;gap:12px;margin:12px 0;flex-wrap:wrap">
      <div class="sec" style="margin:0">Numero max gironi:</div>
      <select class="set-sel" onchange="setMaxGironi(parseInt(this.value))">
        ${[1,2,3,4,5,6].map(n=>`<option value="${n}"${maxGironi===n?' selected':''}>${n} giron${n===1?'e':'i'}</option>`).join('')}
      </select>
      <div class="sec" style="margin:0">Set per girone:</div>
      <select class="set-sel" onchange="builderState.gironiSets=parseInt(this.value)">
        <option value="1"${gironiSets===1?' selected':''}>1 set</option>
        <option value="2"${gironiSets===2?' selected':''}>2 set</option>
      </select>
    </div>
    <div class="sec">Gironi proposti${mode==='entrambi'?' (dal 9°)':''}</div>
    ${draft.map((g,gi)=>`<div class="fase2-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <span class="gbadge ${badge}">Girone ${g.label} — ${g.squadre.length} squadr${g.squadre.length===1?'a':'e'}</span>
        <button class="bxsm bd" onclick="builderRemoveGirone2(${gi})">✕</button>
      </div>
      <div style="min-height:28px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px">
        ${g.squadre.length?g.squadre.map(s=>`<span class="team-chip">${s.nome}${s.posLabel?` <span style="font-size:10px;opacity:.6">${s.posLabel}</span>`:''}<button onclick="builderRemoveTeam2(${gi},'${s.nome.replace(/'/g,"\\'")}')">×</button></span>`).join(''):'<span style="font-size:12px;color:var(--txt2)">Nessuna squadra</span>'}
      </div>
      <div style="font-size:12px;color:var(--txt2);margin-bottom:6px">Sposta in questo girone:</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${pool.filter(t=>!g.squadre.find(s=>s.nome===t.nome)).map(t=>`<button class="bxsm" onclick="builderAddTeam('${t.nome.replace(/'/g,"\\'")}','${(t.soc||'').replace(/'/g,"\\'")}','${((t.pos!==undefined?`${t.pos+1}° Girone ${t.girone}`:''))}'.replace(/'/g,"\\'"),${gi})">${t.nome}</button>`).join('')}
      </div>
    </div>`).join('')}
    <button class="bsm" style="margin-top:4px" onclick="builderAddGirone2()">+ Aggiungi girone</button>`;
  }

  html+=`<div style="display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end"><button onclick="builderCancel()">Annulla</button><button class="bp" onclick="builderConfirm()">✓ Crea fase</button></div></div>`;
  return html;
}

function render(){
  for(const cat of['white','green','red']) if(!S.cats[cat].fasi) S.cats[cat].fasi=[];
  document.getElementById('root').innerHTML=S.cat==='admin'?renderSetup():renderCat(S.cat);
}
setCat('admin');
</script>
